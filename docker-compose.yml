version: '3.8'

services:
  backend:
    build: ./backend
    container_name: trip_planner_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env  
    restart: always

  frontend:
    build: ./frontend
    container_name: trip_planner_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always